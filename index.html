<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spending Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h2 class="sr-only"
      >Spending tracker with card tabs, monthly filters, and duplicate-safe CSV
      import</h2
    >
    <div class="wrap" id="root">
      <div class="top-bar">
        <span class="title">Spending tracker</span>
        <div class="top-actions">
          <button class="btn" onclick="openImport()">Import CSV</button>
          <button class="btn" onclick="saveData()">Save</button>
          <button class="btn" onclick="clearAll()">Clear all</button>
          <button class="btn primary" onclick="openAdd()"
            >+ Add transaction</button
          >
        </div>
      </div>
      <div class="summary" id="summary"></div>
      <div class="tabs-row" id="tabs-row"></div>
      <div class="toolbar" id="toolbar"></div>
      <div class="table-wrap">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
        <div id="empty-msg" class="empty">No transactions for this view.</div>
      </div>
    </div>
    <div id="modal-wrap" style="position: relative"></div>
    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
